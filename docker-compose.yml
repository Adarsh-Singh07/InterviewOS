version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: copilot_postgres_dev
    environment:
      POSTGRES_USER: copilot
      POSTGRES_PASSWORD: copilotpassword
      POSTGRES_DB: copilot_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - db-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U copilot -d copilot_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: copilot_redis_dev
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - db-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: copilot_qdrant_dev
    ports:
      - "6333:6333"
    volumes:
      - qdrantdata:/qdrant/storage
    networks:
      - db-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: copilot_backend_dev
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app
    env_file:
      - .env.development
    environment:
      - ENV_FILE=../.env.development
      - QDRANT_HOST=qdrant
      - DATABASE_URL=postgresql://copilot:copilotpassword@postgres:5432/copilot_db
    ports:
      - "8000:8000"
    networks:
      - backend-network
      - db-network
      - ai-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

  frontend:
    image: node:20-alpine
    container_name: copilot_frontend_dev
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    networks:
      - frontend-network
      - backend-network

networks:
  frontend-network:
    driver: bridge
  backend-network:
    driver: bridge
  db-network:
    driver: bridge
  ai-network:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  qdrantdata:
