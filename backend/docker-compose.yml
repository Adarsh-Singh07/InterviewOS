version: '3.8'

services:
  db:
    image: postgres:15
    container_name: copilot_postgres
    restart: always
    environment:
      POSTGRES_USER: copilot
      POSTGRES_PASSWORD: copilotpassword
      POSTGRES_DB: copilot_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: copilot_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: copilot_qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrantdata:/qdrant/storage

volumes:
  pgdata:
  redisdata:
  qdrantdata:
